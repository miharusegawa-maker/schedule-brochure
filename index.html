<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>イベントスケジュール</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-100 p-6">

<div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">

  <div class="bg-gradient-to-r from-slate-900 to-sky-900 text-white p-8">
    <h1 class="text-3xl font-bold">4月イベント スケジュール</h1>
    <p class="mt-2 text-slate-200">2026/04/14 - 04/15</p>
  </div>

  <div class="grid md:grid-cols-2 gap-6 p-8">

    <div>
      <h2 class="text-xl font-bold mb-2">Day1（4/14）</h2>
      <div class="space-y-3">
        <div class="border p-3 rounded-xl">11:00 アイデア出し</div>
        <div class="border p-3 rounded-xl">12:00 全体説明</div>
        <div class="border p-3 rounded-xl">12:30 開発スタート</div>
        <div class="border p-3 rounded-xl">15:00 休憩</div>
        <div class="border p-3 rounded-xl">17:00 進捗共有</div>
        <div class="border p-3 rounded-xl">18:00 解散</div>
      </div>
    </div>

    <div>
      <h2 class="text-xl font-bold mb-2">Day2（4/15）</h2>
      <div class="space-y-3">
        <div class="border p-3 rounded-xl">11:00 スタート</div>
        <div class="border p-3 rounded-xl">12:30 ランチ</div>
        <div class="border p-3 rounded-xl">16:00 発表</div>
        <div class="border p-3 rounded-xl">17:00 投票</div>
        <div class="border p-3 rounded-xl">17:30 結果発表</div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
